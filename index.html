<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="RtF0EdOSFGkhtyI7Wqm3kh5f4MZL_Xz25EnZkM_prV0" />
    <meta name="description" content="Save and manage your favorite comics list on ComicList. A project by Anas Faiq.">

    <link rel="icon" type="image/svg+xml" href="ComicList-logoFix.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>ComicList</title>
    <script>
      (function () {
        const stored = localStorage.getItem("theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        if (stored === "dark" || (!stored && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
